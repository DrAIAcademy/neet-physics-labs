<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Physics Portal - Dr AI Academy</title>
    <style>
        :root {
            --primary-blue: #0f172a;
            --accent-red: #dc2626;
            --accent-blue: #2563eb;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            color: #1e293b;
        }

        /* Top Bar */
        .top-bar {
            background: var(--primary-blue);
            padding: 12px 24px;
            text-align: right;
            border-bottom: 1px solid #334155;
        }

        .top-bar a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .top-bar a:hover {
            color: #f87171;
            text-decoration: underline;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        header h1 {
            margin: 0;
            font-size: 2.6rem;
        }

        header h1 span { color: #f87171; }
        header p { margin: 12px 0 0 0; font-size: 1.2rem; opacity: 0.85; }

        /* Tabs for Filtering Labs & Games */
        .tabs-container {
            text-align: center;
            margin: 30px 0 10px 0;
        }

        .tab-btn {
            background: #e2e8f0;
            color: #475569;
            border: none;
            padding: 10px 24px;
            margin: 0 8px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        .container {
            max-width: 1300px;
            margin: 20px auto 40px auto;
            padding: 0 24px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 5px solid var(--accent-blue);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Type Tag (Lab vs Game) */
        .type-tag {
            align-self: flex-start;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .tag-lab { background: #e0f2fe; color: #0369a1; }
        .tag-game { background: #fef3c7; color: #b45309; }

        .card h3 {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: #0f172a;
            min-height: 56px;
            display: flex;
            align-items: center;
        }

        .card p {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.5;
            margin: 0 0 24px 0;
            flex-grow: 1;
        }

        .card a {
            display: block;
            text-align: center;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .card a:hover { opacity: 0.9; }

        /* Loader */
        #status-message {
            text-align: center;
            font-size: 1.3rem;
            color: #64748b;
            padding: 60px;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="https://draiacademy.com" target="_blank">By - Dr AI Academy 🎯</a>
    </div>

    <header>
        <h1>NEET <span>Physics</span> Learning Hub</h1>
        <p>Crack Concepts via Advanced Simulations & Gamified Learning Models</p>
    </header>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="filterContent('all')">📚 Show All</button>
        <button class="tab-btn" onclick="filterContent('lab')">🔬 Simulations Only</button>
        <button class="tab-btn" onclick="filterContent('game')">🎮 Games Only</button>
    </div>

    <div class="container">
        <div id="status-message">🔄 Gathering Labs and Games from AI Systems...</div>
        <div class="grid" id="labs-grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 Dr AI Academy. Precision Learning Infrastructure for Medical Aspirants.</p>
    </footer>

    <script>
        const username = 'DrAIAcademy';
        
        // Dono Alag repositories ke naam aur unke links ka pattern
        const repositories = [
            { name: 'neet-physics-labs', type: 'lab', baseUrl: 'https://draiacademy.github.io/neet-physics-labs/' },
            { name: 'neet-physics-games', type: 'game', baseUrl: 'https://draiacademy.github.io/neet-physics-games/' }
        ];

        const premiumThemes = [
            { border: '#2563eb', btn: '#2563eb' },
            { border: '#dc2626', btn: '#dc2626' },
            { border: '#059669', btn: '#059669' },
            { border: '#7c3aed', btn: '#7c3aed' },
            { border: '#ea580c', btn: '#ea580c' }
        ];

        let allItems = []; // Sabhi files ka data store karne ke liye

        function cleanTitle(filename) {
            let name = filename.replace('.html', '').replace(/^dr_ai_neet_/, '').replace(/^physics_lab_/, '').replace(/^game_/, '');
            name = name.replace(/_/g, ' ').replace(/-/g, ' ');
            return name.replace(/\b\w/g, char => char.toUpperCase());
        }

        // Dono types ke liye alag descriptions
        function getDescription(title, type) {
            if (type === 'game') {
                return `Challenge your physics formulas! Play this high-yield interactive gamified arena for ${title} to boost speed and accuracy under pressure.`;
            }
            return `Visualize and analyze the core derivation principles of ${title}. Perfect for strengthening conceptual clarity and clearing tough physics numericals.`;
        }

        async function initializeDashboard() {
            const grid = document.getElementById('labs-grid');
            const statusMessage = document.getElementById('status-message');
            
            try {
                // Dono repos se data ek sath load karne ke liye loop
                for (const repoInfo of repositories) {
                    try {
                        const response = await fetch(`https://api.github.com/repos/${username}/${repoInfo.name}/contents`);
                        if (response.ok) {
                            const data = await response.json();
                            const htmlFiles = data.filter(item => item.name.endsWith('.html') && item.name !== 'index.html');
                            
                            htmlFiles.forEach(file => {
                                allItems.push({
                                    filename: file.name,
                                    title: cleanTitle(file.name),
                                    type: repoInfo.type,
                                    // Direct absolute URL bana rahe hain taaki click karte hi sahi repo khule
                                    url: repoInfo.baseUrl + file.name 
                                });
                            });
                        }
                    } catch (e) {
                        console.error(`Error loading from ${repoInfo.name}:`, e);
                    }
                }

                statusMessage.style.display = 'none';
                renderCards(allItems);

            } catch (error) {
                statusMessage.innerHTML = '❌ Failed to auto-sync repositories. Please check settings.';
            }
        }

        function renderCards(itemsToRender) {
            const grid = document.getElementById('labs-grid');
            grid.innerHTML = ''; // Pehle grid khali karein

            if(itemsToRender.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#64748b;">No items available in this category.</p>';
                return;
            }

            itemsToRender.forEach((item, idx) => {
                const theme = premiumThemes[idx % premiumThemes.length];
                const tagClass = item.type === 'lab' ? 'tag-lab' : 'tag-game';
                const tagText = item.type === 'lab' ? '🔬 Simulation' : '🎮 Physics Game';
                const btnText = item.type === 'lab' ? 'Launch Simulation ⚡' : 'Play Game 🎮';
                const desc = getDescription(item.title, item.type);

                const cardMarkup = `
                    <div class="card" data-type="${item.type}" style="border-left-color: ${theme.border};">
                        <span class="type-tag ${tagClass}">${tagText}</span>
                        <h3>${item.title}</h3>
                        <p>${desc}</p>
                        <a href="${item.url}" target="_blank" style="background-color: ${theme.btn};">
                            ${btnText}
                        </a>
                    </div>
                `;
                grid.innerHTML += cardMarkup;
            });
        }

        // Filter Tabs Logic
        function filterContent(type) {
            // Active class change karein buttons par
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (type === 'all') {
                renderCards(allItems);
            } else {
                const filtered = allItems.filter(item => item.type === type);
                renderCards(filtered);
            }
        }

        initializeDashboard();
    </script>
</body>
</html>
