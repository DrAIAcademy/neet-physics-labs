<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Physics Virtual Labs - Dr AI Academy</title>
    <style>
        :root {
            --primary-blue: #0f172a;
            --accent-red: #dc2626;
            --accent-blue: #2563eb;
            --bg-light: #f8fafc;
            --card-hover: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            color: #1e293b;
        }

        /* Top Bar with Brand Link */
        .top-bar {
            background: var(--primary-blue);
            padding: 12px 24px;
            text-align: right;
            border-bottom: 1px solid #334155;
        }

        .top-bar a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s;
        }

        .top-bar a:hover {
            color: #f87171;
            text-decoration: underline;
        }

        /* Header Styling for NEET Aspirants */
        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 2.6rem;
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: #f87171;
        }

        header p {
            margin: 12px 0 0 0;
            font-size: 1.2rem;
            opacity: 0.85;
            font-weight: 300;
        }

        /* Counter Badge for Labs */
        .lab-counter {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 24px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* Professional Scientific Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 5px solid var(--accent-blue);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .card h3 {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: #0f172a;
            line-height: 1.4;
            min-height: 56px;
            display: flex;
            align-items: center;
        }

        .card p {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.5;
            margin: 0 0 24px 0;
            flex-grow: 1;
        }

        /* Interactive Action Button */
        .card a {
            display: block;
            text-align: center;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        /* Loading & Error States */
        #status-message {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 500;
            color: #64748b;
            padding: 60px;
        }

        .spinner {
            border: 4px solid #e2e8f0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--accent-blue);
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
            color: #94a3b8;
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="https://draiacademy.com" target="_blank">By - Dr AI Academy 🎯</a>
    </div>

    <header>
        <h1>NEET <span>Physics</span> Virtual Simulations</h1>
        <p>Master Core Concepts through Interactive Engineering & Laboratory Models</p>
        <div class="lab-counter" id="lab-count-badge">Detecting Experiments...</div>
    </header>

    <div class="container">
        <div id="status-message">
            <div class="spinner"></div>
            Searching & Compiling NEET Physics Labs...
        </div>
        
        <div class="grid" id="labs-grid">
            </div>
    </div>

    <footer>
        <p>&copy; 2026 Dr AI Academy. Precision Learning Infrastructure for Medical Aspirants.</p>
    </footer>

    <script>
        // Configuration for your Repository
        const config = {
            username: 'DrAIAcademy',
            repo: 'neet-physics-labs'
        };

        // Premium Palette for alternative card styling (Physics Themes)
        const premiumThemes = [
            { border: '#2563eb', btn: '#2563eb', btnHover: '#1d4ed8' }, // Mechanics Blue
            { border: '#dc2626', btn: '#dc2626', btnHover: '#b91c1c' }, // Thermodynamics Red
            { border: '#059669', btn: '#059669', btnHover: '#047857' }, // Optics/Waves Green
            { border: '#7c3aed', btn: '#7c3aed', btnHover: '#6d28d9' }, // Electromagnetism Purple
            { border: '#ea580c', btn: '#ea580c', btnHover: '#c2410c' }  // Modern Physics Orange
        ];

        // Cleans up complex repo names into beautiful standard experiment titles
        function cleanTitle(filename) {
            let name = filename.replace('.html', '');
            // Agar aapke filenames me common prefixes hain toh unhe yahan remove kar sakte hain:
            name = name.replace(/^dr_ai_neet_/, '').replace(/^physics_lab_/, '');
            name = name.replace(/_/g, ' ').replace(/-/g, ' ');
            return name.replace(/\b\w/g, char => char.toUpperCase());
        }

        // Scientific/Conceptual descriptions tailored for NEET exam readiness
        function getPhysicsDescription(title) {
            return `Visualize and analyze the core derivation principles of ${title}. Perfect for strengthening conceptual clarity, numerical graphical data, and clearing high-yield MCQs.`;
        }

        async function initializeDashboard() {
            const grid = document.getElementById('labs-grid');
            const statusMessage = document.getElementById('status-message');
            const counterBadge = document.getElementById('lab-count-badge');
            
            try {
                // Fetching all content from the repo root
                const response = await fetch(`https://api.github.com/repos/${config.username}/${config.repo}/contents`);
                if (!response.ok) throw new Error('Failed to communicate with GitHub API');
                
                const items = await response.json();
                
                // Filtering all HTML files except index.html itself
                const htmlLabs = items.filter(item => item.name.endsWith('.html') && item.name !== 'index.html');
                
                // Hide Loader
                statusMessage.style.display = 'none';
                
                if (htmlLabs.length === 0) {
                    statusMessage.style.display = 'block';
                    statusMessage.innerHTML = '⚠️ No active interactive simulations (.html files) found in this repository.';
                    counterBadge.innerText = '0 Labs Available';
                    return;
                }

                // Update Counter Badge with total files found
                counterBadge.innerText = `📊 ${htmlLabs.length} Interactive Labs Loaded Successfully`;

                // Iterating and generating cards dynamically
                htmlLabs.forEach((file, idx) => {
                    const title = cleanTitle(file.name);
                    const description = getPhysicsDescription(title);
                    
                    // Assign alternate premium scientific themes
                    const theme = premiumThemes[idx % premiumThemes.length];
                    
                    const cardMarkup = `
                        <div class="card" style="border-left-color: ${theme.border};">
                            <h3>${title}</h3>
                            <p>${description}</p>
                            <a href="${file.name}" 
                               style="background-color: ${theme.btn};" 
                               onmouseover="this.style.backgroundColor='${theme.btnHover}'" 
                               onmouseout="this.style.backgroundColor='${theme.btn}'">
                               Launch Simulation ⚡
                            </a>
                        </div>
                    `;
                    grid.innerHTML += cardMarkup;
                });

            } catch (error) {
                console.error(error);
                statusMessage.style.display = 'block';
                statusMessage.innerHTML = '❌ **API Error:** Unable to retrieve the lab directory automatically. Verify repository permissions or public access.';
                counterBadge.innerText = 'Connection Failed';
            }
        }

        // Fire request on load
        initializeDashboard();
    </script>
</body>
</html>
